{% extends "base.html" %}
{% block title %}Edit User — DPP{% endblock %}
{% block page_title %}Edit User{% endblock %}
{% block content %}
<div style="max-width:560px">
  <a href="{{ url_for('users.index') }}"
     style="font-size:13px;color:var(--muted);display:inline-block;margin-bottom:20px">
    ← Back to Users
  </a>
  <div class="card">
    <div class="card-title" style="margin-bottom:20px">Edit — {{ user.username }}</div>
    <form method="POST">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" name="full_name" class="form-control"
                 value="{{ user.full_name or '' }}">
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control"
                 value="{{ user.email or '' }}">
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
        <div class="form-group">
          <label class="form-label">Phone</label>
          <input type="text" name="phone" class="form-control"
                 value="{{ user.phone or '' }}">
        </div>
        <div class="form-group">
          <label class="form-label">Role</label>
          <select name="role" class="form-control">
            <option value="Prosecutor" {{ 'selected' if user.role=='Prosecutor' }}>Prosecutor</option>
            <option value="Secretary"  {{ 'selected' if user.role=='Secretary'  }}>Secretary</option>
            <option value="Admin"      {{ 'selected' if user.role=='Admin'      }}>Admin</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Active</label>
        <input type="checkbox" name="is_active" style="width:auto"
               {{ 'checked' if user.is_active }}>
        <span style="font-size:12px;color:var(--muted);margin-left:6px">User can log in</span>
      </div>
      <div style="background:var(--surface);border-radius:8px;padding:16px;margin-bottom:16px">
        <div style="font-size:12px;font-weight:600;color:var(--muted);
             text-transform:uppercase;letter-spacing:0.4px;margin-bottom:12px">
          Reset Password (optional)
        </div>
        <input type="password" name="new_password" class="form-control"
               placeholder="Leave blank to keep current password">
      </div>
      <div style="display:flex;gap:10px">
        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a href="{{ url_for('users.index') }}" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
