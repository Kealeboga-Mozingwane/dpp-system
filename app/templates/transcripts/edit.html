{% extends "base.html" %}
{% block title %}Edit Transcript — DPP{% endblock %}
{% block page_title %}Edit Transcript{% endblock %}
{% block content %}
<div style="max-width:720px">
  <a href="{{ url_for('transcripts.view', id=transcript.id) }}"
     style="font-size:13px;color:var(--muted);display:inline-block;margin-bottom:20px">
    ← Back to Transcript
  </a>
  <div class="card">
    <div class="card-title" style="margin-bottom:20px">Edit Transcript</div>
    <form method="POST">
      <div class="form-group">
        <label class="form-label">Transcript Content</label>
        <textarea name="content" class="form-control" rows="18">{{ transcript.content }}</textarea>
      </div>
      <div style="display:flex;gap:10px">
        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a href="{{ url_for('transcripts.view', id=transcript.id) }}"
           class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
